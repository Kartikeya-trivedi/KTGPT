<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KT-GPT — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════════════
       KT-GPT — Premium Dark Interface
       ═══════════════════════════════════════════════════════ */
    :root {
      --bg: #06060a;
      --bg-card: #0d0d14;
      --bg-hover: #12121c;
      --border: rgba(255,255,255,0.06);
      --border-hi: rgba(255,255,255,0.12);
      --text: #e4e4eb;
      --text-2: #8b8b9e;
      --text-3: #4e4e62;
      --accent: #7c6aef;
      --accent-dim: rgba(124,106,239,0.15);
      --accent-glow: rgba(124,106,239,0.25);
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.12);
      --orange: #f59e0b;
      --orange-dim: rgba(245,158,11,0.12);
      --red: #f87171;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body, #root { height:100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.06); border-radius:8px; }

    /* ── Layout ─────────────────────────────────────────── */
    .app {
      display:flex; flex-direction:column; height:100%;
      max-width:780px; margin:0 auto; padding:16px 16px 12px;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 20px; border-radius:16px; margin-bottom:12px;
      background: var(--bg-card); border:1px solid var(--border);
    }
    .header-left { display:flex; align-items:center; gap:12px; }
    .logo {
      width:40px; height:40px; border-radius:12px; display:flex;
      align-items:center; justify-content:center;
      background:linear-gradient(135deg, #7c6aef, #5b4bc9);
      font-family:var(--mono); font-weight:700; font-size:14px; color:#fff;
      box-shadow:0 0 20px var(--accent-glow);
    }
    .header h1 { font-size:17px; font-weight:600; letter-spacing:-0.3px; }
    .header h1 span { color:var(--accent); }
    .header-sub { font-size:11px; color:var(--text-3); margin-top:1px; }
    .header-right { display:flex; align-items:center; gap:10px; }
    .mode-label { font-size:11px; color:var(--text-2); font-weight:500; }

    /* ── Toggle ─────────────────────────────────────────── */
    .toggle {
      width:44px; height:24px; border-radius:12px; cursor:pointer;
      background:rgba(255,255,255,0.05); border:1px solid var(--border);
      position:relative; transition:all .3s cubic-bezier(.4,0,.2,1);
    }
    .toggle.on { background:var(--accent-dim); border-color:rgba(124,106,239,0.4); }
    .toggle-knob {
      width:18px; height:18px; border-radius:50%; position:absolute;
      top:2px; left:2px; background:var(--text-3);
      transition:all .3s cubic-bezier(.4,0,.2,1);
    }
    .toggle.on .toggle-knob {
      left:22px; background:var(--accent);
      box-shadow:0 0 10px var(--accent-glow);
    }

    /* ── Tool Banner ────────────────────────────────────── */
    .tool-banner {
      padding:8px 16px; border-radius:10px; margin-bottom:10px;
      background:var(--green-dim); border:1px solid rgba(52,211,153,0.18);
      display:flex; align-items:center; gap:8px;
      font-size:11px; color:var(--green); font-weight:500;
      animation:slideDown .25s ease;
    }
    .tool-banner .pill {
      background:rgba(52,211,153,0.1); border:1px solid rgba(52,211,153,0.2);
      padding:2px 8px; border-radius:6px; font-family:var(--mono); font-size:10px;
    }
    @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    /* ── Messages ───────────────────────────────────────── */
    .messages { flex:1; overflow-y:auto; padding:4px 0; }
    .msg { display:flex; margin-bottom:16px; animation:fadeIn .3s ease; }
    .msg.user { justify-content:flex-end; }
    .msg.assistant { justify-content:flex-start; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .msg-inner { max-width:80%; }
    .msg-label {
      font-size:9px; text-transform:uppercase; letter-spacing:1.5px;
      font-weight:600; margin-bottom:4px; padding:0 2px;
    }
    .msg.user .msg-label { text-align:right; color:var(--accent); }
    .msg.assistant .msg-label { color:var(--text-3); }

    .bubble {
      padding:12px 16px; border-radius:16px; font-size:14px;
      line-height:1.65; white-space:pre-wrap; word-break:break-word;
    }
    .msg.user .bubble {
      background:linear-gradient(135deg, rgba(124,106,239,0.12), rgba(124,106,239,0.04));
      border:1px solid rgba(124,106,239,0.2);
      border-bottom-right-radius:4px;
    }
    .msg.assistant .bubble {
      background:var(--bg-card); border:1px solid var(--border);
      border-bottom-left-radius:4px;
    }

    /* ── Tool Badge ─────────────────────────────────────── */
    .tool-badge {
      display:flex; align-items:center; gap:8px; margin-top:6px;
      padding:7px 12px; border-radius:10px;
      background:var(--green-dim); border:1px solid rgba(52,211,153,0.15);
      font-size:11px;
    }
    .tool-badge .name { color:var(--green); font-family:var(--mono); font-weight:500; }
    .tool-badge .expr { color:var(--text-3); font-family:var(--mono); }
    .tool-badge .arrow { color:var(--text-3); }
    .tool-badge .result { color:var(--orange); font-family:var(--mono); font-weight:600; }

    /* ── Empty State ────────────────────────────────────── */
    .empty {
      flex:1; display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:20px; opacity:.7;
    }
    .empty-icon {
      width:64px; height:64px; border-radius:20px; display:flex;
      align-items:center; justify-content:center; font-size:32px;
      background:var(--accent-dim); border:1px solid rgba(124,106,239,0.15);
    }
    .empty h2 { font-size:18px; font-weight:600; }
    .empty p { font-size:13px; color:var(--text-3); max-width:320px; text-align:center; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
    .chip {
      padding:8px 14px; border-radius:20px; font-size:12px; cursor:pointer;
      background:rgba(255,255,255,0.02); border:1px solid var(--border);
      color:var(--text-2); transition:all .2s;
    }
    .chip:hover {
      background:var(--accent-dim); border-color:rgba(124,106,239,0.3);
      transform:translateY(-1px); color:var(--text);
    }

    /* ── Typing ─────────────────────────────────────────── */
    .typing { display:flex; gap:4px; padding:14px 18px; }
    .typing-dot {
      width:6px; height:6px; border-radius:50%; background:var(--accent);
      animation:blink 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay:.2s; }
    .typing-dot:nth-child(3) { animation-delay:.4s; }
    @keyframes blink { 0%,100%{opacity:.15} 50%{opacity:1} }

    /* ── Input ──────────────────────────────────────────── */
    .input-bar {
      display:flex; align-items:center; gap:8px; padding:6px;
      border-radius:16px; margin-top:12px;
      background:var(--bg-card); border:1px solid var(--border);
      transition:border-color .3s, box-shadow .3s;
    }
    .input-bar:focus-within {
      border-color:rgba(124,106,239,0.35);
      box-shadow:0 0 24px rgba(124,106,239,0.06);
    }
    .input-bar input {
      flex:1; background:transparent; border:none; outline:none;
      font-size:14px; padding:10px 12px; color:var(--text);
      font-family:var(--font);
    }
    .input-bar input::placeholder { color:var(--text-3); }
    .send-btn {
      padding:10px 20px; border-radius:12px; border:none; cursor:pointer;
      background:var(--accent); color:#fff; font-size:13px; font-weight:600;
      font-family:var(--font); transition:all .2s;
    }
    .send-btn:hover { background:#6b59de; box-shadow:0 0 16px var(--accent-glow); }
    .send-btn:disabled { opacity:.25; cursor:not-allowed; }

    /* ── Footer ─────────────────────────────────────────── */
    .footer {
      text-align:center; font-size:9px; color:var(--text-3);
      letter-spacing:1.5px; text-transform:uppercase; margin-top:8px; opacity:.35;
    }

    /* ── Ambient ────────────────────────────────────────── */
    .ambient {
      position:fixed; inset:0; pointer-events:none; z-index:-1;
      background:
        radial-gradient(ellipse at 15% 0%, rgba(124,106,239,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 100%, rgba(52,211,153,0.03) 0%, transparent 55%);
    }
  </style>
</head>
<body>
  <div class="ambient"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const BACKEND_URL = "https://mindrix--ktgpt-chat-service-fastapi-app.modal.run/chat";

    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [toolMode, setToolMode] = useState(false);
      const endRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => { endRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, loading]);
      useEffect(() => { inputRef.current?.focus(); }, []);

      const send = async (text) => {
        const msg = text || input;
        if (!msg.trim() || loading) return;
        setMessages(m => [...m, { role:'user', content:msg }]);
        setInput('');
        setLoading(true);

        try {
          const res = await fetch(BACKEND_URL, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ prompt:msg, toolMode }),
          });
          const data = await res.json();
          setMessages(m => [...m, {
            role:'assistant',
            content: data.answer || data.raw_output || 'No response.',
            tool_call: data.tool_call,
            tool_result: data.tool_result,
          }]);
        } catch(e) {
          setMessages(m => [...m, {
            role:'assistant',
            content:'⚠ Could not reach backend. Is local_service.py running?'
          }]);
        }
        setLoading(false);
        inputRef.current?.focus();
      };

      const handleKey = (e) => { if(e.key==='Enter') send(); };

      const suggestions = toolMode
        ? ['What is 347 × 891?', 'Square root of 2025', 'Calculate 99 * 99 + 1']
        : ['Say hello in French', 'Explain black holes', 'Write a haiku about code'];

      return (
        <div className="app">
          {/* Header */}
          <div className="header">
            <div className="header-left">
              <div className="logo">KT</div>
              <div>
                <h1>KT-GPT <span>1B</span></h1>
                <div className="header-sub">Sparse MoE · MLA · Local GPU</div>
              </div>
            </div>
            <div className="header-right">
              <span className="mode-label">{toolMode ? '🔧 Tools' : '💬 Chat'}</span>
              <div
                className={`toggle ${toolMode ? 'on' : ''}`}
                onClick={() => setToolMode(!toolMode)}
              >
                <div className="toggle-knob" />
              </div>
            </div>
          </div>

          {/* Tool banner */}
          {toolMode && (
            <div className="tool-banner">
              <span>⚡ Tool Mode</span>
              <span style={{color:'var(--text-3)'}}>·</span>
              <span className="pill">calculator</span>
              <span className="pill">search</span>
            </div>
          )}

          {/* Messages */}
          <div className="messages">
            {messages.length === 0 ? (
              <div className="empty">
                <div className="empty-icon">🧠</div>
                <h2>KT-GPT is ready</h2>
                <p>{toolMode
                  ? 'Ask a math question — the calculator will handle it.'
                  : 'Ask anything. Toggle tools for calculator & search.'}</p>
                <div className="chips">
                  {suggestions.map((s,i) => (
                    <div key={i} className="chip" onClick={() => send(s)}>{s}</div>
                  ))}
                </div>
              </div>
            ) : (
              <>
                {messages.map((m, i) => (
                  <div key={i} className={`msg ${m.role}`}>
                    <div className="msg-inner">
                      <div className="msg-label">{m.role === 'user' ? 'You' : 'KT-GPT'}</div>
                      <div className="bubble">{m.content}</div>
                      {m.tool_call && (
                        <div className="tool-badge">
                          <span>🔧</span>
                          <span className="name">{m.tool_call.name}</span>
                          {m.tool_call.arguments?.expression && (
                            <span className="expr">({m.tool_call.arguments.expression})</span>
                          )}
                          {m.tool_result && (
                            <>
                              <span className="arrow">→</span>
                              <span className="result">{m.tool_result}</span>
                            </>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                ))}
                {loading && (
                  <div className="msg assistant">
                    <div className="msg-inner">
                      <div className="msg-label">KT-GPT</div>
                      <div className="bubble typing">
                        <div className="typing-dot" />
                        <div className="typing-dot" />
                        <div className="typing-dot" />
                      </div>
                    </div>
                  </div>
                )}
              </>
            )}
            <div ref={endRef} />
          </div>

          {/* Input */}
          <div className="input-bar">
            <input
              ref={inputRef}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
              placeholder={toolMode ? 'Ask a math question...' : 'Send a message...'}
              disabled={loading}
            />
            <button className="send-btn" onClick={() => send()} disabled={loading || !input.trim()}>
              {loading ? '···' : 'Send'}
            </button>
          </div>

          <div className="footer">KT-GPT · 1B Parameters · Sparse MoE + MLA · Local Inference</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
