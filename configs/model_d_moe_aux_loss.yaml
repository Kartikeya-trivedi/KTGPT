# Model D — MoE with Aux Loss (instead of bias-based LB)
model:
  type: moe
  hidden_dim: 768
  n_layers: 20
  n_heads: 12
  n_kv_heads: 4
  expert_ffn_dim: 1536
  n_experts: 8
  n_shared_experts: 1
  n_routed_experts: 7
  top_k: 2
  vocab_size: 32000
  max_seq_len: 2048
  use_moe: true
  use_shared_expert: true
  load_balance_type: aux_loss  # traditional aux loss, NOT bias-based
  aux_loss_weight: 0.01

training:
  phase: 1
  total_tokens: 1_000_000_000
  batch_size_tokens: 524288
  learning_rate: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 2000
  weight_decay: 0.1
  grad_clip: 1.0
  optimizer: adamw
  beta1: 0.9
  beta2: 0.95
  precision: bf16
  lr_schedule: cosine

checkpointing:
  save_every_steps: 1000
  eval_every_steps: 2000

logging:
  wandb_project: mini-moe
  wandb_run_name: model-d-moe-aux-loss
